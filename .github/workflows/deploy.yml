name: Build, Push to ECR & Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_PREFIX: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build all JARs
        run: |
          for dir in PhotoAppAPIConfigServer PhotoAppDiscoveryService ApiGateway PhotoAppApiUsers PhotoAppApiAlbums; do
            echo "Building $dir..."
            (cd $dir && mvn clean package -DskipTests -q)
          done

      - name: Restore Config Server keystore
        run: |
          mkdir -p PhotoAppAPIConfigServer/keystores
          echo "${{ secrets.CONFIG_SERVER_KEYSTORE_B64 }}" | base64 -d > PhotoAppAPIConfigServer/keystores/apiEncryptionKey.jks

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push all images
        run: |
          for item in \
            "PhotoAppAPIConfigServer:config-server" \
            "PhotoAppDiscoveryService:eureka-server" \
            "ApiGateway:api-gateway" \
            "PhotoAppApiUsers:users-ws" \
            "PhotoAppApiAlbums:albums-ws"
          do
            DIR="${item%%:*}"
            SVC="${item##*:}"
            IMAGE="$ECR_PREFIX/$SVC:latest"
            echo ">>> Building and pushing $SVC"
            docker build -t $IMAGE $DIR/
            docker push $IMAGE
          done

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ env.ECR_PREFIX }}
            cd ~/photo-app
            docker-compose --env-file .env.aws pull
            
            docker-compose --env-file .env.aws up -d rabbitmq
            sleep 20
            
            docker-compose --env-file .env.aws up -d config-server
            sleep 30
            
            docker-compose --env-file .env.aws up -d eureka-server
            sleep 30
            
            docker-compose --env-file .env.aws up -d albums-ws
            sleep 30
            
            docker-compose --env-file .env.aws up -d users-ws
            sleep 30
            
            docker-compose --env-file .env.aws up -d api-gateway
            sleep 20
                   
            docker image prune -f
            echo "Deployed at $(date)"