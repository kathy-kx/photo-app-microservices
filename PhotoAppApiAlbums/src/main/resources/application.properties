server.port=${PORT:0}
spring.application.name=albums-ws

eureka.client.serviceUrl.defaultZone = http://localhost:8010/eureka
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance_id:${random.value}}

spring.devtools.restart.enabled = true

# 指定日志文件路径（文件名）
# 日志将同时输出到控制台和此文件
# Specify the log file path and file name
# Logs will be written to both the console and this file
# Local dev: set ELK_LOG_DIR as env var in IntelliJ Run Config
# Docker: overridden by docker-compose environment variable
logging.file.name=${ELK_LOG_DIR:logs}/albums-ws.log

# When debugging or trying to find the cause of issues, uncomment this:
#logging.level.org.springframework.security=DEBUG

# ===== Micrometer + Zipkin configuration =====
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

