spring.application.name=PhotoAppAPIConfigServer
server.port=8012

#spring.profiles.active=native,git

# Git repository HTTPS URL
spring.cloud.config.server.git.uri=https://github.com/kathy-kx/PhotoAppConfiguration.git
# GitHub authentication credentials (username + Personal Access Token or password)
spring.cloud.config.server.git.username=kathy-kx
spring.cloud.config.server.git.password=${GIT_PASSWORD}
# 启动时立即克隆仓库（推荐开启，避免首次请求延迟）Clone the repository at startup to avoid delays on the first request
spring.cloud.config.server.git.clone-on-start=true 

# Expose the bus-refresh Actuator endpoint over HTTP
#management.endpoints.web.exposure.include=busrefresh
management.endpoints.web.exposure.include=*

# rabbitmq configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Symmetric encryption and decryption key
#encrypt.key=a random string

# Asymmetric encryption and decryption
# Keystore 文件路径（file:// 开头；${user.home} 为当前用户 home 目录）Path to the keystore file (starts with file: ; ${user.home} refers to the current user's home directory)
encrypt.keyStore.location=${ENCRYPT_KEYSTORE_LOCATION:file:/keystores/apiEncryptionKey.jks}
# Keystore password (same as the value passed to -storepass)
encrypt.keyStore.password=${ENCRYPT_KEYSTORE_PASSWORD}
# Key alias (same as the value passed to -alias)
encrypt.keyStore.alias=apiEncryptionKey