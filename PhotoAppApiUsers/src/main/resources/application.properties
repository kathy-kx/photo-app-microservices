spring.application.name=users-ws

# assign port number automatically
server.port=0
#eureka.instance.hostname=localhost

# Eureka Client Configuration
# This is the port number specified in Eureka server --8010
eureka.client.service-url.defaultZone=http://localhost:8010/eureka

# if you have multiple eureka servers for high availability, then set this value to true.
#eureka.client.register-with-eureka=false
#eureka.client.fetch-registry=true

# Eureka Instance Configuration
eureka.instance.preferIpAddress=true
# if we start more than one instance, we must give them unique instance id
# ${spring.application.instance-id:${random.value}}: 一个可以由外部配置或环境变量设置的实例ID。如果未设置，则使用${random.value}作为默认值。
eureka.instance.instance-id=${spring.application.name}:${spring.application.instance-id:${random.value}}
#eureka.instance.instance-id=${spring.application.name}:${random.value}
eureka.instance.leaseRenewalIntervalInSeconds=10
eureka.instance.leaseExpirationDurationInSeconds=30

# Spring DevTools Configuration
# To restart and redeploy the application automatically when we make changes to codes
spring.devtools.restart.enabled=true

# h2 in-momory database
#spring.h2.console.enabled=true
#spring.h2.console.settings.web-allow-others=true
#spring.datasource.url=jdbc:h2:mem:testdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# MySQL configuration is located in Config Server (users-ws.properties)

# validation
server.error.include-message=always
server.error.include-binding-errors=always

# 在config server配置了。删除User微服务本地配置
# 只允许API Gateway对应ip的流量访问users微服务
# gateway.ip=10.0.0.33
# gateway.ip=192.168.68.54
# gateway.ip=127.0.0.1

#token.expiration_time=3600000
#token.secret=***
# Customized login URL
#login.url.path=/users/login

# http://localhost:8012 is a domain and port on which Config Server is running
# 启动时，从指定地址 http://localhost:8012 的 Spring Config Server 拉取远程配置。
# optional: 如果 Config Server 不可用，应用 仍然可以启动
spring.config.import=optional:configserver:http://localhost:8012

#排查错误
#logging.level.org.springframework.security=DEBUG

# rabbitmq configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# 暴露 health、beans、mappings、httpexchanges 端点
#management.endpoints.web.exposure.include=health,beans,mappings,httpexchange,circuitbreakers,circuitbreakerevents,info
# 也可以直接用=*，暴露所有
management.endpoints.web.exposure.include=*

# Enable Feign Logging
logging.level.com.kxzhu.photoapp.api.users.data.AlbumsServiceClient=debug
logging.level.com.kxzhu.photoapp.api.users.service.UsersServiceImpl=debug

# ===== Actuator Health Endpoint Configuration =====
# Enable health endpoint
management.endpoint.health.enabled=true
# Show health details (including circuit breaker status)
management.endpoint.health.show-details=always
# 启用熔断器健康指示器
management.health.circuitbreakers.enabled=true

# ===== Resilience4j Circuit Breaker Configuration =====
# Format: resilience4j.circuitbreaker.instances.{instance_name}.{item}
# instance_name must be same as the name in @CircuitBreaker(name="albums-ws")

# 失败率阈值（百分比），达到此阈值时熔断器从 CLOSED → OPEN
resilience4j.circuitbreaker.instances.albums-ws.failure-rate-threshold=50

# 是否允许熔断器从 OPEN 自动过渡到 HALF_OPEN（无需额外请求触发）
resilience4j.circuitbreaker.instances.albums-ws.automatic-transition-from-open-to-half-open-enabled=true

# OPEN 状态下等待多久后自动过渡到 HALF_OPEN（支持 s/ms）
resilience4j.circuitbreaker.instances.albums-ws.wait-duration-in-open-state=10s

# 滑动窗口类型：COUNT_BASED（基于请求数量）或 TIME_BASED（基于时间）
resilience4j.circuitbreaker.instances.albums-ws.sliding-window-type=COUNT_BASED

# 滑动窗口大小（COUNT_BASED 时为最近 N 次请求，TIME_BASED 时为最近 N 秒）
resilience4j.circuitbreaker.instances.albums-ws.sliding-window-size=2

# 最小调用次数（达到此数量后才开始计算失败率）
resilience4j.circuitbreaker.instances.albums-ws.minimum-number-of-calls=1

# 事件缓冲区大小（Actuator 端点展示的最近事件数量）
resilience4j.circuitbreaker.instances.albums-ws.event-consumer-buffer-size=10

# ===== Resilience4j Aspect Order =====
# Circuit Breaker 优先级设为 1（较低）
resilience4j.circuitbreaker.circuit-breaker-aspect-order=1
# Retry 优先级设为 2（较高，先于 Circuit Breaker 执行）
resilience4j.retry.retry-aspect-order=2

# ===== Resilience4j Retry Configuration =====
# 格式：resilience4j.retry.instances.{实例名}.{配置项}
# 实例名必须与 @Retry(name="albums-ws") 中的 name 一致

# 最大重试次数（包含第一次请求，总共尝试 3 次）
resilience4j.retry.instances.albums-ws.max-attempts=3
# 每次重试前等待的时间
resilience4j.retry.instances.albums-ws.wait-duration=2s
# 启用指数退避（每次等待时间按倍数递增）
resilience4j.retry.instances.albums-ws.enable-exponential-backoff=true
# 指数退避的倍率（每次等待时间 = 上次等待时间 × multiplier）
resilience4j.retry.instances.albums-ws.exponential-backoff-multiplier=5

# ===== Micrometer + Zipkin 配置 =====
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# 指定日志文件路径（文件名）
# 日志将同时输出到控制台和此文件
# Local dev: set ELK_LOG_DIR as env var in IntelliJ Run Config (e.g. /Users/kxzhu/elk-logs)
# Docker: overridden by docker-compose environment variable
logging.file.name=${ELK_LOG_DIR:logs}/users-ws.log